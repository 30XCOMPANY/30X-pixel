[progress]
enabled = true
interval_minutes = 5

[drivers.codex]
reasoning = "high"

[drivers.claudecode]
reasoning = "high"

[drivers.opencode]
reasoning = "high"

[drivers.gemini-cli]
reasoning = "high"
enabled = true
